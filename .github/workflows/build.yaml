name: build

on:
  push:
    branches:
      - "*"
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
      - name: Build site
        run: nix build .\#packages.x86_64-linux.default
